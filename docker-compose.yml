services:
  auth-service:
    build: ./auth-service
    container_name: trust-auth-service
    environment:
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      AUTH_DATA_DIR: /app/data
    volumes:
      - auth_data:/app/data
    ports:
      - "8001:8001"

  loan-service:
    build: ./loan-service
    container_name: trust-loan-service
    ports:
      - "8002:8002"

  trust-score-service:
    build: ./trust-score-service
    container_name: trust-score-service
    ports:
      - "8003:8003"

  advisor-service:
    build: ./advisor-service
    container_name: trust-advisor-service
    environment:
      TRUST_SCORE_SERVICE_URL: ${TRUST_SCORE_SERVICE_URL:-http://trust-score-service:8003}
    ports:
      - "8004:8004"
    depends_on:
      - trust-score-service

  fraud-detection-service:
    build: ./fraud-detection-service
    container_name: trust-fraud-detection-service
    environment:
      TRUST_SCORE_SERVICE_URL: ${TRUST_SCORE_SERVICE_URL:-http://trust-score-service:8003}
    ports:
      - "8005:8005"
    depends_on:
      - trust-score-service

  digital-twin-service:
    build: ./digital-twin-service
    container_name: trust-digital-twin-service
    environment:
      TRUST_SCORE_SERVICE_URL: ${TRUST_SCORE_SERVICE_URL:-http://trust-score-service:8003}
    ports:
      - "8007:8007"
    depends_on:
      - trust-score-service

  monitoring-service:
    build: ./monitoring-service
    container_name: trust-monitoring-service
    ports:
      - "8006:8006"
    env_file:
      - ./monitoring-service/.env    

  gold-loan-service:
    build: ./gold-loan-service
    container_name: trust-gold-loan-service
    environment:
      TRUST_SCORE_SERVICE_URL: ${TRUST_SCORE_SERVICE_URL:-http://trust-score-service:8003}
    ports:
      - "8008:8008"
    depends_on:
      - trust-score-service

  gateway:
    build: ./gateway
    container_name: trust-api-gateway
    environment:
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL:-http://auth-service:8001}
      LOAN_SERVICE_URL: ${LOAN_SERVICE_URL:-http://loan-service:8002}
      TRUST_SCORE_SERVICE_URL: ${TRUST_SCORE_SERVICE_URL:-http://trust-score-service:8003}
      ADVISOR_SERVICE_URL: ${ADVISOR_SERVICE_URL:-http://advisor-service:8004}
      FRAUD_DETECTION_SERVICE_URL: ${FRAUD_DETECTION_SERVICE_URL:-http://fraud-detection-service:8005}
      MONITORING_SERVICE_URL: ${MONITORING_SERVICE_URL:-http://monitoring-service:8006}
      DIGITAL_TWIN_SERVICE_URL: ${DIGITAL_TWIN_SERVICE_URL:-http://digital-twin-service:8007}
      GOLD_LOAN_SERVICE_URL: ${GOLD_LOAN_SERVICE_URL:-http://gold-loan-service:8008}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      RATE_LIMIT_DEFAULT: ${RATE_LIMIT_DEFAULT:-100/minute}
    ports:
      - "8000:8000"
    depends_on:
      - auth-service
      - loan-service
      - trust-score-service
      - advisor-service
      - fraud-detection-service
      - monitoring-service
      - digital-twin-service
      - gold-loan-service

  trust-ui:
    build:
      context: ./trust-ui
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    container_name: trust-ui
    ports:
      - "8080:80"
    depends_on:
      - gateway

volumes:
  auth_data:
