services:
  auth-service:
    build: ./auth-service
    container_name: trust-auth-service
    environment:
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      AUTH_DATA_DIR: /app/data
    volumes:
      - auth_data:/app/data
    ports:
      - "8001:8001"

  loan-service:
    build: ./loan-service
    container_name: trust-loan-service
    ports:
      - "8002:8002"

  trust-score-service:
    build: ./trust-score-service
    container_name: trust-score-service
    ports:
      - "8003:8003"

  gateway:
    build: ./gateway
    container_name: trust-api-gateway
    environment:
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL:-http://auth-service:8001}
      LOAN_SERVICE_URL: ${LOAN_SERVICE_URL:-http://loan-service:8002}
      TRUST_SCORE_SERVICE_URL: ${TRUST_SCORE_SERVICE_URL:-http://trust-score-service:8003}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      RATE_LIMIT_DEFAULT: ${RATE_LIMIT_DEFAULT:-100/minute}
    ports:
      - "8000:8000"
    depends_on:
      - auth-service
      - loan-service
      - trust-score-service

  trust-ui:
    build:
      context: ./trust-ui
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    container_name: trust-ui
    ports:
      - "8080:80"
    depends_on:
      - gateway

volumes:
  auth_data:
